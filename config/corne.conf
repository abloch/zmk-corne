# Enable ZMK Studio for real-time keymap editing
CONFIG_ZMK_STUDIO=y

# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

# Enable mouse support
CONFIG_ZMK_MOUSE=y

# Enable Soft Off for power saving
CONFIG_ZMK_PM_SOFT_OFF=y

# Experimental Bluetooth features for better battery and connection
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Enable deep sleep support
CONFIG_ZMK_SLEEP=y
# 15 minutes of inactivity before entering deep sleep (ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Split battery reporting improvements
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Bluetooth TX power - higher for better stability between halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Debounce settings for better responsiveness
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
